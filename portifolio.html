<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrossel com Modal</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Swiper -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

  <style>
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* FAZ O CONTEÚDO EMPURRAR O FOOTER */
    .container.py-5 {
      flex: 1;
    }

    body {
      background: #f8f9fa;
    }

    .swiper {
      width: 100%;
      max-width: 1000px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .swiper-slide img {
      width: 100%;
      height: 520px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
    }

    /* setas */
    .swiper-button-next,
    .swiper-button-prev {
      color: #0d6efd;
    }

    /* bolinhas */
    .swiper-pagination-bullet {
      background: #000;
      opacity: 0.4;
    }

    .swiper-pagination-bullet-active {
      background: #0d6efd;
      opacity: 1;
    }

    #modalImg {
      max-height: 400px;
      object-fit: cover;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand fw-bold" href="#">
      Meu Portfólio
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menuNavbar">

      <ul class="navbar-nav me-auto">

        <li class="nav-item">
          <a class="nav-link active" href="/atividade/index.html">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/atividade/portifolio.html">Portfólio</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="contato.html">Contato</a>
        </li>

      </ul>

    </div>
  </div>
</nav>

<!-- CONTEÚDO -->
<div class="container py-5">

  <h2 class="text-center mb-4">Meu Portfólio</h2>

  <!-- CARROSSEL -->
  <div class="swiper mySwiper">

    <div class="swiper-wrapper">

      <div class="swiper-slide">
        <img src="img1.png" data-title="Projeto 1" data-desc="A tela inicial na qual eu fiz baseada em um jogo (Rocket League)">
      </div>

      <div class="swiper-slide">
        <img src="img2.png" data-title="Projeto 2" data-desc="Prototipagem alta para o trabalho do Fábio Esposto">
      </div>

      <div class="swiper-slide">
        <img src="img3.png" data-title="Projeto 3" data-desc="Prototipagem alta para outro trabalho do Fábio Esposto">
      </div>

      <div class="swiper-slide">
        <img src="img4.png" data-title="Projeto 4" data-desc="Tela de cadastro feito para  mobile no expo">
      </div>

      <div class="swiper-slide">
        <img src="img5.jpg" data-title="Projeto 5" data-desc="Alterador de texto">
      </div>

      <div class="swiper-slide">
        <img src="img6.jpg" data-title="Projeto 6" data-desc="Carrossel feito com Bootstrap">
      </div>

      <div class="swiper-slide">
        <img src="img7.jpg" data-title="Projeto 7" data-desc="Altereção de parágrafo">
      </div>

      <div class="swiper-slide">
        <img src="img8.jpg" data-title="Projeto 8" data-desc="Página Login">
      </div>

      <div class="swiper-slide">
        <img src="img9.jpg" data-title="Projeto 9" data-desc="Calculadora feita no HTML">
      </div>

      <div class="swiper-slide">
        <img src="img10.jpg" data-title="Projeto 10" data-desc="Relógio feito no HTML">
      </div>

    </div>

    <!-- setas -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>

    <!-- bolinhas -->
    <div class="swiper-pagination"></div>

  </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="imgModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body text-center">
        <img id="modalImg" class="img-fluid rounded mb-3">
        <p id="modalDesc"></p>
      </div>

    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white py-4 mt-auto">

  <div class="container text-center">

    <h5>Contato</h5>

    <p>Email: vinicius.rodrigues.lima213@gmail.com</p>

    <div class="d-flex justify-content-center gap-3">

      <a href="https://www.instagram.com/vini_lima.xz/" class="text-white">
        <i class="bi bi-instagram fs-3"></i>
      </a>

      <a href="#" class="text-white">
        <i class="bi bi-github fs-3"></i>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  // Swiper
  const swiper = new Swiper(".mySwiper", {
    loop: true,

    autoplay: {
      delay: 3000,
      disableOnInteraction: false,
    },

    navigation: {
      nextEl: ".swiper-button-next",
      prevEl: ".swiper-button-prev",
    },

    pagination: {
      el: ".swiper-pagination",
      clickable: true,
    },
  });

  // Modal
  const modal = new bootstrap.Modal(document.getElementById("imgModal"));

  document.querySelectorAll(".swiper-slide img").forEach(img => {
    img.addEventListener("click", () => {
      document.getElementById("modalImg").src = img.src;
      document.getElementById("modalTitle").innerText = img.dataset.title;
      document.getElementById("modalDesc").innerText = img.dataset.desc;
      modal.show();
    });
  });
</script>

</body>
</html>
