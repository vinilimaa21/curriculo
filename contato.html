  <style>
     body {
    background: #f8f9fa;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  main {
    flex: 1;
  }

  .contact-card {
    max-width: 700px;
    margin: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-radius: 12px;
  }

  /* Botão WhatsApp Animado */
  .btn-whatsapp {
    width: 100%;
    display: block;
    font-size: 17px;
    background: transparent;
    border: 2px solid #25D366;
    padding: 1em 1.5em;
    color: #207c42;
    text-transform: uppercase;
    font-weight: bold;
    position: relative;
    transition: 0.5s ease;
    cursor: pointer;
    z-index: 1;
    overflow: hidden;
    border-radius: 8px;
  }

  .btn-whatsapp::before {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    height: 3px;
    width: 0;
    background-color: #25D366;
    transition: 0.5s ease;
  }

  .btn-whatsapp::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    height: 0;
    width: 100%;
    background-color: #25D366;
    transition: 0.4s ease;
    z-index: -1;
  }

  .btn-whatsapp:hover {
    color: rgb(255, 255, 255);
    transition-delay: 0.3s;
  }

  .btn-whatsapp:hover::before {
    width: 100%;
  }

  .btn-whatsapp:hover::after {
    height: 100%;
    transition-delay: 0.3s;
  }
  </style>
</head>

<body>

<!-- ================= CONTEÚDO ================= -->

<main class="container py-5">

  <h2 class="text-center mb-4">Entre em Contato</h2>

  <div class="card contact-card p-4">

    <form id="formContato">

      <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input
          type="text"
          id="nome"
          class="form-control"
          placeholder="Seu nome"
          required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="Seu email"
          required>
      </div>

      <div class="mb-3">
        <label for="mensagem" class="form-label">Mensagem</label>
        <textarea
          id="mensagem"
          class="form-control"
          rows="5"
          placeholder="Escreva sua mensagem"
          required></textarea>
      </div>

      <button type="submit" class="btn-whatsapp" id="watzap">
  <i class="bi bi-whatsapp"></i>
  Enviar pelo WhatsApp
</button>

    </form>

  </div>

</main>
